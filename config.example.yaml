# Copy to config.yaml and adjust paths.

browser:
  # Persistent Chromium profile — stay logged in to WhatsApp Web after first QR scan.
  user_data_dir: "~/.scoutsignal/browser-profile"
  headless: false
  # Optional: "chrome" to use Google Chrome instead of bundled Chromium
  channel: null
  # BCP-47 UI locale. Use he-IL if WhatsApp Web is in Hebrew (buttons / search labels).
  locale: "en-US"
  # Extra Chromium flags — useful for launchd / headless (fewer first-run popups).
  extra_chromium_args:
    - "--no-first-run"
    - "--no-default-browser-check"
    - "--no-sandbox"
  # Optional override; when headless and omitted, ScoutSignal uses a modern Chrome UA
  # so WhatsApp Web does not show the "update Chrome" gate page on Linux.
  # user_agent: "Mozilla/5.0 ..."

run:
  poll_interval_seconds: 300
  max_messages_per_chat: 120
  # First time a chat is opened: only record messages (no emails) to avoid a burst of old posts.
  seed_on_first_scan: true
  whatsapp_url: "https://web.whatsapp.com"
  # Max seconds to open one chat via search (modal / no results / stuck click). Default 5 minutes.
  open_chat_timeout_seconds: 300

defaults:
  # Extra phrases only if you need something not listed in keyword_watch (merged after watch phrases).
  include_keywords: []
  # Recommended: define roles here. Each row = Position + Language (EN / HE) + combinations (match substrings).
  # Duplicate (position, language) blocks in YAML are merged into one email row.
  keyword_watch:
    - position: DevOps Manager
      language: EN
      combinations:
        - DevOps manager
        - Head of DevOps
    - position: DevOps Manager
      language: HE
      combinations:
        - מנהל DevOps
  exclude_keywords: []
  require_url: false
  min_text_length: 15

email:
  enabled: true
  smtp_host: smtp.gmail.com
  smtp_port: 587
  use_tls: true
  from_addr: "you@gmail.com"
  # Shown before <you@gmail.com> in the From line. Replies go to reply_to_addr, not this mailbox.
  from_display_name: "(Do Not Reply) ScoutSignal"
  # When true (default), Reply-To is a non-monitored address — replies are not delivered.
  no_reply: true
  # Optional Reply-To override when no_reply is true (default: no-reply@do-not-reply.invalid).
  # reply_to_addr: "no-reply@do-not-reply.invalid"
  to_addrs:
    - "you@gmail.com"
  subject_prefix: "[ScoutSignal] "
  password_env: SCOUTSIGNAL_SMTP_PASSWORD
  # If true, send an email after every scan (even 0 job hits) with keyword stats per chat.
  always_send_summary: false

state:
  sqlite_path: "~/.scoutsignal/state.db"

# On scan errors, save a PNG next to state.db (screenshots/…) for debugging.
diagnostics:
  error_screenshots: true
  # Optional override; default is <directory of state.sqlite_path>/screenshots
  screenshots_dir: null

logging:
  level: INFO
